name: check-streams

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # important for rebase/pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run script
        run: python check.py

      - name: Commit and push results (rebase-safe)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add status.json

          git commit -m "update status" || echo "no changes"

          git pull --rebase origin main
          git push origin main
